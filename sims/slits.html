<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>光線モデル・スリット — Optics Lab</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    .sim-canvas-wrap { height: calc(100vh - 50px - 52px); }
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .sim-canvas-wrap { height: 55vw; min-height: 220px; }
    }
    .tab-bar {
      display: flex;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-5);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
    }
    .tab-btn {
      padding: var(--space-1) var(--space-4);
      border-radius: var(--radius);
      font-size: var(--font-size-sm);
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: 1.5px solid transparent;
      background: transparent;
      color: var(--color-text-muted);
      transition: all var(--transition);
    }
    .tab-btn.active {
      background: white;
      color: var(--color-accent);
      border-color: var(--color-accent);
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">
    <a href="../index.html" class="site-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
      Optics Lab
    </a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">← トップ</a>
      <a href="lens.html" class="nav-link">レンズ</a>
      <a href="lens-object.html" class="nav-link">物体の像</a>
      <a href="mirror.html" class="nav-link">平面鏡</a>
      <a href="concave.html" class="nav-link">凹面鏡</a>
      <a href="slits.html" class="nav-link active">光線モデル</a>
      <a href="eye.html" class="nav-link">目</a>
      <a href="3d.html" class="nav-link">3D</a>
      <a href="practice.html" class="nav-link">練習</a>
    </nav>
  </div>
</header>

<div class="sim-page">
  <div class="sim-toolbar">
    <div>
      <span style="font-weight:700;" id="simTitle">1スリットの光線モデル</span>
    </div>
    <div class="mode-switcher" id="modeSwitcher" style="margin-left:auto;">
      <button class="mode-btn active" data-mode="student">自習</button>
      <button class="mode-btn" data-mode="teacher">授業</button>
      <button class="mode-btn" data-mode="sheet">作図</button>
    </div>
    <button id="btnFullscreen" class="btn btn--ghost btn--sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab1" onclick="switchMode(1)">① 1光源・1スリット</button>
    <button class="tab-btn" id="tab2" onclick="switchMode(2)">② 2光源・1スリット</button>
  </div>

  <div class="sim-body" id="simBody">
    <aside class="sim-sidebar" id="simSidebar">
      <div>
        <div class="control-label">コントロール</div>
        <div style="margin-top:var(--space-3); display:flex; flex-direction:column; gap:var(--space-4);">
          <div class="control-group">
            <div class="control-row">
              <span class="control-label">光線の本数</span>
              <span class="range-value" id="val-rays">40</span>
            </div>
            <input type="range" id="range-rays" min="4" max="200" value="20" step="2">
          </div>
          <div class="control-group">
            <div class="control-row">
              <span class="control-label">スリットの高さ</span>
              <span class="range-value" id="val-slit">33</span>
            </div>
            <input type="range" id="range-slit" min="5" max="80" value="33" step="1">
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <div style="background: var(--color-surface); border-radius: var(--radius); padding: var(--space-4);">
        <div class="control-label" style="margin-bottom: var(--space-3);">観察ポイント</div>
        <ul style="font-size: var(--font-size-xs); color: var(--color-text-muted); line-height:2; margin-left: var(--space-4);">
          <li>スクリーンに映る光の範囲は スリットと光源の位置によって決まる</li>
          <li>スリットが小さいほど、映る光の範囲が狭い</li>
          <li>2光源のとき、影の重なり方に注目</li>
        </ul>
      </div>
      <div class="divider"></div>
      <div style="font-size:var(--font-size-xs); color:var(--color-text-muted); line-height:1.7;">
        <strong>操作方法</strong><br>
        • マウス移動: 光源を動かす<br>
        • クリック: 全光線 / 代表線 切替<br>
        • タブ: モード切替
      </div>
    </aside>

    <div class="sim-canvas-wrap">
      <canvas id="simCanvas"></canvas>
      <div class="canvas-hint">マウスで光源を動かす | クリックで光線切替</div>
    </div>
  </div>
</div>

<script src="../js/optics.js"></script>
<script>
  const cvs = document.getElementById('simCanvas');
  const oc = new OpticsCanvas(cvs);

  let simMode = 1; // 1 or 2
  let srcX, srcY;
  let showAllRays = true;
  let rayCount = 20;
  let slitSizeRatio = 33; // percent of h

  function initPositions() {
    const w = oc.width, h = oc.height;
    srcX = w * 0.18;
    srcY = h * 0.5;
  }
  oc.onResize = () => initPositions();
  initPositions();

  function slitX() { return oc.width * 0.55; }
  function slitSize() { return oc.height * slitSizeRatio / 100; }
  function screenX() { return oc.width - oc.width / 30; }

  function switchMode(m) {
    simMode = m;
    document.getElementById('tab1').classList.toggle('active', m === 1);
    document.getElementById('tab2').classList.toggle('active', m === 2);
    document.getElementById('simTitle').textContent =
      m === 1 ? '1スリットの光線モデル' : '2光源の光線モデル';
  }

  // Read URL param
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('mode') === '2') switchMode(2);

  function drawOneSource(sx, sy, color) {
    const w = oc.width, h = oc.height;
    const slx = slitX();
    const slH = slitSize();
    const slTop = h / 2 - slH / 2;
    const slBot = h / 2 + slH / 2;
    const scX = screenX();
    const numRays = showAllRays ? rayCount * 2 : 7;

    for (let i = 0; i <= numRays; i++) {
      const t = numRays === 0 ? 0 : (i / numRays) - 0.5;
      // direction toward the slit
      const angle = Math.PI / 2 + (Math.PI / 2) * t * 1.5;
      const dx = Math.sin(angle);
      const dy = -Math.cos(angle);

      // Intersection with slit plane x = slx
      if (Math.abs(dx) < 0.001) continue;
      const t_slit = (slx - sx) / dx;
      const hitY = sy + dy * t_slit;

      if (hitY >= slTop && hitY <= slBot) {
        // passes through slit
        oc.drawRay(sx, sy, slx, hitY, color, showAllRays ? 1 : 1.5, showAllRays ? 0.5 : 0.9);
        // continue to screen
        const t_screen = (scX - slx) / dx;
        const screenY = hitY + dy * t_screen;
        oc.drawRay(slx, hitY, scX, screenY, color, showAllRays ? 1 : 1.5, showAllRays ? 0.5 : 0.9);
      } else {
        // blocked
        oc.drawRay(sx, sy, slx, hitY, color, 1, showAllRays ? 0.15 : 0.05);
      }
    }
  }

  function draw() {
    const w = oc.width, h = oc.height;
    if (w <= 0 || h <= 0) return;

    oc.drawBackground();
    oc.drawGrid(Math.floor(w / 20));

    const slx = slitX();
    const scX = screenX();
    const slH = slitSize();

    // Draw slit barrier
    oc.drawSlit(slx, h, h / 2 - slH / 2, h / 2 + slH / 2);

    // Draw screen
    oc.drawScreen(scX, h);
    oc.drawLabel(scX + 10, 18, 'スクリーン', 'rgba(0,0,0,0.4)', 10, 'left');

    // Draw rays
    if (simMode === 1) {
      drawOneSource(srcX, srcY, '#e67e00');
      oc.drawPointSource(srcX, srcY, 9);
      oc.drawLabel(srcX, srcY - 20, '光源', 'rgba(200,110,0,0.85)', 11);
    } else {
      // 2 light sources
      const src2Y = srcY + h * 0.3;
      drawOneSource(srcX, srcY, '#e67e00');
      drawOneSource(srcX, src2Y, '#c83232');
      oc.drawPointSource(srcX, srcY, 9);
      oc.drawPointSource(srcX, src2Y, 9, '#c83232');
      oc.drawLabel(srcX - 14, srcY - 14, '光源①', 'rgba(200,110,0,0.85)', 10, 'right');
      oc.drawLabel(srcX - 14, src2Y + 18, '光源②', 'rgba(200,50,50,0.85)', 10, 'right');
    }

    // Slit label
    oc.drawLabel(slx, h / 2 - slH / 2 - 12, 'スリット', 'rgba(0,0,0,0.4)', 10);
  }

  cvs.addEventListener('mousemove', e => {
    const rect = cvs.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (cvs.width / rect.width);
    const my = (e.clientY - rect.top) * (cvs.height / rect.height);
    if (mx < slitX() - 5) { srcX = mx; srcY = my; }
  });
  cvs.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = cvs.getBoundingClientRect();
    const t = e.touches[0];
    const mx = (t.clientX - rect.left) * (cvs.width / rect.width);
    const my = (t.clientY - rect.top) * (cvs.height / rect.height);
    if (mx < slitX() - 5) { srcX = mx; srcY = my; }
  }, { passive: false });
  cvs.addEventListener('click', () => { showAllRays = !showAllRays; });

  UI.bindRange('range-rays', 'val-rays', v => { rayCount = Math.round(v); });
  UI.bindRange('range-slit', 'val-slit', v => { slitSizeRatio = v; });
  UI.initModeButtons('#modeSwitcher', { setMode: m => {
    document.body.classList.remove('teacher-mode', 'sheet-mode');
    if (m === 'teacher') document.body.classList.add('teacher-mode');
    if (m === 'sheet') document.body.classList.add('sheet-mode');
  }});
  document.getElementById('btnFullscreen').addEventListener('click', () => UI.toggleFullscreen(document.documentElement));

  requestAnimationFrame(function loop() { draw(); requestAnimationFrame(loop); });
</script>
</body>
</html>
