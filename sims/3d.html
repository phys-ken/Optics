<!-- Three.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/examples/js/controls/OrbitControls.js"></script>
<script src="../js/optics.js"></script>
<script>
  /* ============================================================
     3D Light Ray Simulation using Three.js
  ============================================================ */

  const canvasEl = document.getElementById('canvas3d');
  const wrap = document.getElementById('canvasWrap');

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf0f0f0);
  scene.fog = new THREE.FogExp2(0xf0f0f0, 0.04);

  const camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
  camera.position.set(6, 5, 8);

  const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  function resizeRenderer() {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (w <= 0 || h <= 0) return;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resizeRenderer();
  window.addEventListener('resize', resizeRenderer);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, canvasEl);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 2;
  controls.maxDistance = 25;

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  // ---- Helper: Grid & Axes ----
  const gridHelper = new THREE.GridHelper(12, 24, 0xaaaaaa, 0xdddddd);
  scene.add(gridHelper);

  const axesHelper = new THREE.AxesHelper(4);
  scene.add(axesHelper);

  // ---- Materials ----
  const RAY_MATERIAL = new THREE.LineBasicMaterial({
    color: 0xe67e00, transparent: true, opacity: 0.3, depthWrite: false
  });
  const RAY_MATERIAL_HIGHLIGHT = new THREE.LineBasicMaterial({
    color: 0xcc6600, transparent: true, opacity: 0.7, depthWrite: false
  });

  // ---- Scene Objects ----
  let lightSource;
  let barrierGroup = new THREE.Group();
  let screenMesh;
  let rayGroup = new THREE.Group();
  let shadowConeGroup = new THREE.Group();
  scene.add(barrierGroup);
  scene.add(rayGroup);
  scene.add(shadowConeGroup);

  // State
  let state = {
    preset: 'shadow1',
    rayCount: 200,
    srcY: 0,
    barrierZ: 0,
    showScreen: true,
    showAxes: true,
    showShadowCone: false,
  };

  /* ---- Geometry Helpers ---- */

  function makeGlowSphere(color, r, pos) {
    const geo = new THREE.SphereGeometry(r, 24, 24);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 2,
      transparent: true, opacity: 0.95
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    // Point light
    const pLight = new THREE.PointLight(color, 2, 20);
    pLight.position.copy(pos);
    mesh.add(pLight);
    return mesh;
  }

  function clearGroup(group) {
    while (group.children.length) {
      const c = group.children[0];
      if (c.geometry) c.geometry.dispose();
      if (c.material) c.material.dispose();
      group.remove(c);
    }
  }

  /* ---- Screen ---- */
  function makeScreen(posZ, w = 5, h = 4) {
    const geo = new THREE.PlaneGeometry(w, h);
    const mat = new THREE.MeshStandardMaterial({
      color: 0x334155, side: THREE.DoubleSide,
      transparent: true, opacity: 0.85
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.y = 0;
    mesh.position.set(0, h / 2 - 2, posZ);
    // Edge wireframe
    const edges = new THREE.EdgesGeometry(geo);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x2563eb, opacity: 0.4, transparent: true });
    const wireframe = new THREE.LineSegments(edges, edgeMat);
    mesh.add(wireframe);
    return mesh;
  }

  /* ---- Barrier with a hole ---- */
  function makeBarrierWithTriangleHole(posZ) {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x1e293b, side: THREE.DoubleSide });

    // 4 pieces around a triangle hole
    const boardW = 4, boardH = 4;
    const triSize = 1.2;

    // Approximate: use a plane with clip (simplified: use 3 rectangular panels)
    // Full board
    const fullGeo = new THREE.PlaneGeometry(boardW, boardH);
    const mesh = new THREE.Mesh(fullGeo, new THREE.MeshStandardMaterial({ color: 0x1e293b, side: THREE.DoubleSide, transparent: true, opacity: 0.9 }));
    mesh.position.set(0, 0, posZ);
    group.add(mesh);

    // Triangle "hole" indicator (glowing outline)
    const triShape = new THREE.Shape();
    const hw = triSize / 2;
    triShape.moveTo(0, triSize * 0.6);
    triShape.lineTo(-hw, -triSize * 0.4);
    triShape.lineTo(hw, -triSize * 0.4);
    triShape.closePath();

    const triGeo = new THREE.ShapeGeometry(triShape);
    const triMat = new THREE.MeshBasicMaterial({ color: 0x10b981, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
    const triMesh = new THREE.Mesh(triGeo, triMat);
    triMesh.position.set(0, 0, posZ + 0.01);
    group.add(triMesh);

    // Triangle outline
    const triEdgeGeo = new THREE.BufferGeometry();
    const verts = new Float32Array([
      0, triSize * 0.6, 0,
      -hw, -triSize * 0.4, 0,
      hw, -triSize * 0.4, 0,
      0, triSize * 0.6, 0,
    ]);
    triEdgeGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    const triEdge = new THREE.Line(triEdgeGeo, new THREE.LineBasicMaterial({ color: 0x10b981, opacity: 0.9, transparent: true }));
    triEdge.position.set(0, 0, posZ + 0.01);
    group.add(triEdge);

    return group;
  }

  /* ---- Ray casting through triangle hole ---- */
  function generateRaysThroughTriangle(srcPos, barrierZ, count) {
    const rays = [];
    // Triangle hole vertices
    const triSize = 1.2;
    const hw = triSize / 2;
    const triVerts = [
      new THREE.Vector3(0, triSize * 0.6, barrierZ),
      new THREE.Vector3(-hw, -triSize * 0.4, barrierZ),
      new THREE.Vector3(hw, -triSize * 0.4, barrierZ),
    ];

    const added = new Set();
    let attempts = 0;
    while (rays.length < count && attempts < count * 10) {
      attempts++;
      // Random point inside triangle using barycentric coords
      const r1 = Math.random(), r2 = Math.random();
      const sqr1 = Math.sqrt(r1);
      const u = 1 - sqr1, v = sqr1 * (1 - r2), w = sqr1 * r2;
      const hitX = u * triVerts[0].x + v * triVerts[1].x + w * triVerts[2].x;
      const hitY = u * triVerts[0].y + v * triVerts[1].y + w * triVerts[2].y;
      const hitPoint = new THREE.Vector3(hitX, hitY, barrierZ);
      rays.push({ from: srcPos.clone(), hit: hitPoint });
    }
    return rays;
  }

  /* ---- Build ray geometry ---- */
  function buildRayLines(rays, extendZ, material, alpha = 0.18) {
    const group = new THREE.Group();
    const positions = [];

    for (const ray of rays) {
      const dir = ray.hit.clone().sub(ray.from).normalize();
      const end = ray.hit.clone().add(dir.multiplyScalar(extendZ));
      positions.push(ray.from.x, ray.from.y, ray.from.z);
      positions.push(ray.hit.x, ray.hit.y, ray.hit.z);
      positions.push(NaN, NaN, NaN); // break

      // After-barrier segment
      positions.push(ray.hit.x, ray.hit.y, ray.hit.z);
      positions.push(end.x, end.y, end.z);
      positions.push(NaN, NaN, NaN);
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const mat = material.clone();
    mat.opacity = alpha;
    const line = new THREE.LineSegments(geo, mat);
    group.add(line);
    return group;
  }

  /* ---- Presets ---- */
  const PRESETS = {
    shadow1: {
      label: '三角穴の影',
      srcPos: () => new THREE.Vector3(-3, state.srcY, 0),
      barrierZ: () => state.barrierZ + 0,
      screenZ: 4,
      build: buildShadow1,
    },
    shadow2: {
      label: '2光源の影',
      srcPos: () => new THREE.Vector3(-3, state.srcY, 0),
      barrierZ: () => state.barrierZ + 0,
      screenZ: 4,
      build: buildShadow2,
    },
    lens3d: {
      label: 'レンズ集光',
      build: buildLens3D,
    },
    cone: {
      label: '光の錐',
      build: buildCone,
    },
  };

  function buildShadow1() {
    clearScene();
    const bz = state.barrierZ;
    const srcX = -3;
    const srcPos = new THREE.Vector3(srcX, state.srcY, 0);

    // Light source
    lightSource = makeGlowSphere(0xe67e00, 0.12, srcPos);
    scene.add(lightSource);

    // Barrier
    const barrier = makeBarrierWithTriangleHole(bz);
    barrierGroup.add(barrier);

    // Screen
    if (state.showScreen) {
      screenMesh = makeScreen(4);
      scene.add(screenMesh);
    }

    // Rays
    const rays = generateRaysThroughTriangle(srcPos, bz, state.rayCount);
    const rg = buildRayLines(rays, 10, RAY_MATERIAL, 0.22);
    rayGroup.add(rg);

    // Shadow cone
    if (state.showShadowCone) {
      buildShadowConeVis(srcPos, bz);
    }

    document.getElementById('presetLabel').textContent = '三角穴の影';
  }

  function buildShadow2() {
    clearScene();
    const bz = state.barrierZ;

    // 2 light sources
    const src1 = new THREE.Vector3(-3, state.srcY + 0.8, 0);
    const src2 = new THREE.Vector3(-3, state.srcY - 0.8, 0);

    lightSource = makeGlowSphere(0xe67e00, 0.1, src1);
    scene.add(lightSource);
    const ls2 = makeGlowSphere(0xc83232, 0.1, src2);
    scene.add(ls2);

    const barrier = makeBarrierWithTriangleHole(bz);
    barrierGroup.add(barrier);

    if (state.showScreen) {
      screenMesh = makeScreen(4);
      scene.add(screenMesh);
    }

    const rays1 = generateRaysThroughTriangle(src1, bz, state.rayCount / 2);
    const rays2 = generateRaysThroughTriangle(src2, bz, state.rayCount / 2);
    const rg1 = buildRayLines(rays1, 10, new THREE.LineBasicMaterial({ color: 0xe67e00, transparent: true }), 0.3);
    const rg2 = buildRayLines(rays2, 10, new THREE.LineBasicMaterial({ color: 0xc83232, transparent: true }), 0.3);
    rayGroup.add(rg1, rg2);

    document.getElementById('presetLabel').textContent = '2光源の影';
  }

  function buildLens3D() {
    clearScene();
    const srcPos = new THREE.Vector3(-4, state.srcY, 0);

    // Light source
    lightSource = makeGlowSphere(0xe67e00, 0.12, srcPos);
    scene.add(lightSource);

    // Lens representation (disk)
    const lensGeo = new THREE.CircleGeometry(1.5, 48);
    const lensMat = new THREE.MeshStandardMaterial({
      color: 0x2563eb, transparent: true, opacity: 0.3, side: THREE.DoubleSide
    });
    const lensMesh = new THREE.Mesh(lensGeo, lensMat);
    lensMesh.rotation.y = Math.PI / 2;
    lensMesh.position.set(0, 0, 0);
    scene.add(lensMesh);

    // Focal point
    const focalDist = 2;
    const focalSphere = makeGlowSphere(0xdc2626, 0.07, new THREE.Vector3(focalDist, 0, 0));
    scene.add(focalSphere);

    // Screen
    if (state.showScreen) {
      screenMesh = makeScreen(0);
      screenMesh.rotation.y = Math.PI / 2;
      screenMesh.position.set(focalDist + 0.5, 0.5, 0);
      scene.add(screenMesh);
    }

    // Parallel rays converging to focus
    const n = state.rayCount;
    const positions = [];
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * Math.PI * 2;
      const r = Math.random() * 1.5;
      const hy = r * Math.cos(angle);
      const hz = r * Math.sin(angle);
      // Ray: from far left to lens plane
      const hitX = 0;
      // then to focal point
      positions.push(-5, hy, hz, hitX, hy, hz, NaN, NaN, NaN);
      positions.push(hitX, hy, hz, focalDist, 0, 0, NaN, NaN, NaN);
      positions.push(focalDist, 0, 0, focalDist + 3, hy * (-1), hz * (-1), NaN, NaN, NaN);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const mat = new THREE.LineBasicMaterial({ color: 0xe67e00, transparent: true, opacity: 0.25 });
    rayGroup.add(new THREE.LineSegments(geo, mat));

    document.getElementById('presetLabel').textContent = 'レンズ集光（3D）';
  }

  function buildCone() {
    clearScene();
    const srcPos = new THREE.Vector3(-4, state.srcY, 0);
    lightSource = makeGlowSphere(0xe67e00, 0.12, srcPos);
    scene.add(lightSource);

    // Cone of rays spreading out
    const n = state.rayCount;
    const positions = [];
    for (let i = 0; i < n; i++) {
      const theta = Math.acos(1 - 2 * Math.random());
      const phi = Math.random() * Math.PI * 2;
      const dx = Math.sin(theta) * Math.cos(phi);
      const dy = Math.sin(theta) * Math.sin(phi);
      const dz = Math.cos(theta) * 0.5; // bias forward
      const len = 8 + Math.random() * 2;
      positions.push(srcPos.x, srcPos.y, srcPos.z);
      positions.push(srcPos.x + dx * len * 0.6, srcPos.y + dy * len * 0.6, srcPos.z + dz * len * 0.6);
      positions.push(NaN, NaN, NaN);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const mat = new THREE.LineBasicMaterial({ color: 0xe67e00, transparent: true, opacity: 0.2 });
    rayGroup.add(new THREE.LineSegments(geo, mat));

    document.getElementById('presetLabel').textContent = '光の球面波（3D）';
  }

  function buildShadowConeVis(srcPos, barrierZ) {
    // Visual shadow cone (triangular prism approximation)
    const triSize = 1.2;
    const hw = triSize / 2;
    // 3 edges of shadow cone from source through triangle vertices
    const vertices = [
      new THREE.Vector3(0, triSize * 0.6, barrierZ),
      new THREE.Vector3(-hw, -triSize * 0.4, barrierZ),
      new THREE.Vector3(hw, -triSize * 0.4, barrierZ),
    ];
    const positions = [];
    for (const v of vertices) {
      const dir = v.clone().sub(srcPos).normalize();
      positions.push(srcPos.x, srcPos.y, srcPos.z);
      positions.push(v.x + dir.x * 8, v.y + dir.y * 8, v.z + dir.z * 8);
      positions.push(NaN, NaN, NaN);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const mat = new THREE.LineBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.5 });
    shadowConeGroup.add(new THREE.LineSegments(geo, mat));
  }

  function clearScene() {
    clearGroup(barrierGroup);
    clearGroup(rayGroup);
    clearGroup(shadowConeGroup);
    if (lightSource) { scene.remove(lightSource); lightSource = null; }
    if (screenMesh) { scene.remove(screenMesh); screenMesh = null; }
  }

  /* ---- Load Preset ---- */
  function loadPreset(name) {
    state.preset = name;
    document.querySelectorAll('.preset-btn').forEach((btn, i) => {
      const names = ['shadow1', 'shadow2', 'lens3d', 'cone'];
      btn.classList.toggle('active', names[i] === name);
    });
    PRESETS[name]?.build();
  }

  // Initial load
  loadPreset('shadow1');

  /* ---- Controls binding ---- */
  UI.bindRange('range-rays', 'val-rays', v => {
    state.rayCount = Math.round(v);
    loadPreset(state.preset);
  });
  UI.bindRange('range-srcY', 'val-srcY', v => {
    state.srcY = v;
    loadPreset(state.preset);
  });
  UI.bindRange('range-barrierZ', 'val-barrierZ', v => {
    state.barrierZ = v;
    loadPreset(state.preset);
  });
  UI.bindCheckbox('cb-showscreen', v => { state.showScreen = v; loadPreset(state.preset); });
  UI.bindCheckbox('cb-showaxes', v => {
    state.showAxes = v;
    axesHelper.visible = v;
    gridHelper.visible = v;
  });
  UI.bindCheckbox('cb-shadowcone', v => { state.showShadowCone = v; loadPreset(state.preset); });

  UI.initModeButtons('#modeSwitcher', { setMode: m => {
    document.body.classList.remove('teacher-mode');
    if (m === 'teacher') document.body.classList.add('teacher-mode');
  }});
  document.getElementById('btnFullscreen').addEventListener('click', () => UI.toggleFullscreen(wrap));

  /* ---- Render Loop ---- */
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // Expose for external calls
  window.loadPreset = loadPreset;
</script>
</body>
</html>
