<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点光源とレンズ — Optics Lab</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    .sim-canvas-wrap { height: calc(100vh - 50px - 52px); }
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .sim-canvas-wrap { height: 55vw; min-height: 220px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="site-header__inner">
    <a href="../index.html" class="site-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
      Optics Lab
    </a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">← トップ</a>
      <a href="lens.html" class="nav-link active">レンズ</a>
      <a href="lens-object.html" class="nav-link">物体の像</a>
      <a href="mirror.html" class="nav-link">平面鏡</a>
      <a href="concave.html" class="nav-link">凹面鏡</a>
      <a href="slits.html" class="nav-link">光線モデル</a>
      <a href="eye.html" class="nav-link">目</a>
      <a href="3d.html" class="nav-link">3D</a>
      <a href="practice.html" class="nav-link">練習</a>
    </nav>
  </div>
</header>

<!-- Simulation Page Body -->
<div class="sim-page">

  <!-- Toolbar -->
  <div class="sim-toolbar">
    <!-- Breadcrumb-style title -->
    <div>
      <span style="font-weight:700; font-size:var(--font-size-base);">点光源とレンズ</span>
    </div>

    <!-- Mode switcher -->
    <div class="mode-switcher" id="modeSwitcher" style="margin-left:auto;">
      <button class="mode-btn active" data-mode="student">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        自習
      </button>
      <button class="mode-btn" data-mode="teacher">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        授業
      </button>
      <button class="mode-btn" data-mode="sheet">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        作図
      </button>
    </div>

    <!-- Fullscreen -->
    <button id="btnFullscreen" class="btn btn--ghost btn--sm" title="全画面">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </div>

  <!-- Main Layout -->
  <div class="sim-body" id="simBody">

    <!-- Sidebar -->
    <aside class="sim-sidebar" id="simSidebar">

      <!-- Controls -->
      <div>
        <div class="control-label">コントロール</div>
        <div style="margin-top: var(--space-3); display:flex; flex-direction:column; gap: var(--space-4);">

          <div class="control-group">
            <div class="control-row">
              <span class="control-label">光線の本数</span>
              <span class="range-value" id="val-rays">40</span>
            </div>
            <input type="range" id="range-rays" min="4" max="120" value="20" step="2">
          </div>

          <div class="control-group">
            <div class="control-row">
              <span class="control-label">焦点距離 (相対)</span>
              <span class="range-value" id="val-focal">17</span>
            </div>
            <input type="range" id="range-focal" min="8" max="30" value="17" step="1">
          </div>

          <label class="checkbox-label">
            <input type="checkbox" id="cb-construction">
            作図線を表示
          </label>

          <label class="checkbox-label">
            <input type="checkbox" id="cb-allrays" checked>
            全光線を表示
          </label>

          <label class="checkbox-label">
            <input type="checkbox" id="cb-dimline">
            距離ラベルを表示
          </label>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Info Panel -->
      <div class="info-panel">
        <div class="info-panel__title">物理量</div>
        <div class="info-row">
          <span class="info-row__label">物体距離 a</span>
          <span class="info-row__value" id="info-a">—</span>
        </div>
        <div class="info-row">
          <span class="info-row__label">像距離 b</span>
          <span class="info-row__value" id="info-b">—</span>
        </div>
        <div class="info-row">
          <span class="info-row__label">焦点距離 f</span>
          <span class="info-row__value" id="info-f">—</span>
        </div>
        <div class="info-row">
          <span class="info-row__label">倍率 m</span>
          <span class="info-row__value" id="info-m">—</span>
        </div>
        <div class="info-row">
          <span class="info-row__label">像の種類</span>
          <span class="info-row__value" id="info-type" style="font-family:var(--font-body); font-size:11px;">—</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Formula -->
      <div class="formula-box">
        <div class="control-label" style="margin-bottom:6px;">レンズの公式</div>
        <p>1/f = 1/a + 1/b</p>
        <p style="margin-top:4px;">m = −b/a</p>
      </div>

      <div class="divider"></div>

      <div style="font-size: var(--font-size-xs); color: var(--color-text-muted); line-height:1.7;">
        <strong>操作方法</strong><br>
        • マウス移動: 光源を動かす<br>
        • クリック: 全光線 / 代表線 切替
      </div>
    </aside>

    <!-- Canvas -->
    <div class="sim-canvas-wrap">
      <canvas id="simCanvas"></canvas>
      <div class="canvas-hint" id="canvasHint">マウスを動かして光源を移動 | クリックで光線切替</div>
    </div>
  </div>
</div><!-- .sim-page -->

<script src="../js/optics.js"></script>
<script>
  /* ============================================================
     Lens Simulation (点光源 + 凸レンズ)
  ============================================================ */
  const cvs = document.getElementById('simCanvas');
  const oc = new OpticsCanvas(cvs);

  // State
  let srcX, srcY;
  let showAllRays = true;
  let showConstruction = false;
  let showDimLine = false;
  let focalRatio = 17; // f = w / focalRatio
  let rayCount = 20;

  function initPositions() {
    const w = oc.width, h = oc.height;
    srcX = w * 0.22;
    srcY = h * 0.38;
  }

  oc.onResize = () => initPositions();
  initPositions();

  // Lens position
  function lensX() { return oc.width * 0.5; }
  function focalLen() { return oc.width / focalRatio; }

  // Image calculation
  function calcImage() {
    const w = oc.width, h = oc.height;
    const lx = lensX();
    const f = focalLen();
    const a = lx - srcX; // object distance
    const b = Optics.lensEquation(a, f); // image distance
    const m = Optics.magnification(a, b);
    const imgX = lx + b;
    const srcOff = srcY - h / 2;
    const imgY = h / 2 - m * srcOff;
    return { a, b, f, m, imgX, imgY };
  }

  // Draw loop
  function draw() {
    const w = oc.width, h = oc.height;
    if (w <= 0 || h <= 0) return;

    oc.drawBackground();
    oc.drawGrid(Math.floor(w / 20));
    oc.drawAxis();

    const lx = lensX();
    const f = focalLen();
    const { a, b, m, imgX, imgY } = calcImage();

    // Focal points
    oc.drawFocusPoint(lx + f, h / 2);
    oc.drawFocusPoint(lx - f, h / 2);

    if (showDimLine) {
      oc.drawDimensionLine(srcX, lx, h * 0.88, `a = ${a.toFixed(0)}`, 'rgba(200,120,0,0.5)');
      if (isFinite(imgX)) {
        oc.drawDimensionLine(lx, imgX, h * 0.88, `b = ${Math.abs(b).toFixed(0)}`, 'rgba(37,99,235,0.5)');
      }
    }

    // Draw rays
    const aperture = h * 0.45;
    const numRays = showAllRays ? rayCount * 2 : 3;

    for (let i = 0; i <= numRays; i++) {
      const t = numRays === 0 ? 0 : (i / numRays) - 0.5;
      const hitY = h / 2 + aperture * t;
      if (Math.abs(hitY - h / 2) > aperture / 2 + 1) continue;

      // Ray from source to lens
      oc.drawRay(srcX, srcY, lx, hitY, '#e67e00', showAllRays ? 1 : 2, showAllRays ? 0.5 : 1);

      // Ray after lens
      if (isFinite(imgX)) {
        const end = { x: w * 1.5, y: hitY + (imgY - hitY) * (w * 1.5 - lx) / (imgX - lx) };
        oc.drawRay(lx, hitY, end.x, end.y, '#e67e00', showAllRays ? 1 : 2, showAllRays ? 0.5 : 1);
        // Virtual ray (dashed) for virtual image
        if (b < 0 && !showAllRays) {
          oc.drawVirtualRay(lx, hitY, imgX - (imgX - lx) * 2, hitY - (imgY - hitY) * 2,
            'rgba(200, 100, 0, 0.4)');
        }
      } else {
        // Parallel rays for object at focal point
        oc.drawRay(lx, hitY, w * 1.5, hitY, '#e67e00', showAllRays ? 1 : 2, showAllRays ? 0.4 : 1);
      }
    }

    // Construction lines
    if (showConstruction) {
      // Ray 1: parallel → through far focal point
      const fary = h / 2;
      oc.drawVirtualRay(srcX, srcY, lx, srcY, 'rgba(200,100,0,0.55)', 1.5);
      if (isFinite(imgX)) {
        const dxF = imgX - lx; const dyF = imgY - srcY;
        oc.drawVirtualRay(lx, srcY, lx + dxF * 3, srcY + dyF * 3, 'rgba(200,100,0,0.35)', 1);
      }
      // Ray 2: through center (undeviated)
      oc.drawVirtualRay(srcX, srcY, w * 1.5,
        h / 2 + (srcY - h / 2) * (1 - (w * 1.5 - srcX) / (lx - srcX) * (-1)),
        'rgba(37,99,235,0.5)', 1.5);
      // Ray 3: through near focal point → parallel
      oc.drawVirtualRay(srcX, srcY, lx, h / 2 + (srcY - (h / 2)) * (lx - srcX) / (f + lx - srcX) * f / f,
        'rgba(22,163,74,0.5)', 1.5);
    }

    // Image
    if (isFinite(imgX) && imgX > 0 && imgX < w * 2) {
      if (b > 0) {
        // Real image
        oc.drawPointSource(imgX, imgY, 8, 'rgba(37,99,235,0.8)');
        oc.drawLabel(imgX, imgY - 15, '像', 'rgba(37,99,235,0.9)', 11);
      } else {
        // Virtual image (dashed circle)
        const ctx = oc.ctx;
        ctx.beginPath();
        ctx.arc(imgX, imgY, 8, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(37,99,235,0.6)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]);
        ctx.stroke();
        ctx.setLineDash([]);
        oc.drawLabel(imgX, imgY - 15, '虚像', 'rgba(37,99,235,0.7)', 11);
      }
    }

    // Lens
    oc.drawConvexLens(lx, h, h * 0.8);
    oc.drawLabel(lx, 20, 'レンズ', 'rgba(37,99,235,0.8)', 11);

    // Source
    oc.drawPointSource(srcX, srcY, 9);
    oc.drawLabel(srcX, srcY - 20, '光源', 'rgba(200,110,0,0.85)', 11);

    // Report info
    const imgType = isFinite(b) ? Optics.imageType(m) : null;
    UI.updateInfo({
      a: a.toFixed(0),
      b: isFinite(b) ? b.toFixed(0) : Infinity,
      f: f.toFixed(0),
      m: isFinite(m) ? m.toFixed(2) : Infinity,
    });
    const typeEl = document.getElementById('info-type');
    if (typeEl && imgType) {
      typeEl.textContent = `${imgType.label} · ${imgType.orientation}`;
    } else if (typeEl) {
      typeEl.textContent = '(焦点上)';
    }
  }

  // Mouse interaction
  cvs.addEventListener('mousemove', e => {
    const rect = cvs.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (cvs.width / rect.width);
    const my = (e.clientY - rect.top) * (cvs.height / rect.height);
    if (mx < lensX() - 5) {
      srcX = mx;
      srcY = my;
    }
  });

  cvs.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = cvs.getBoundingClientRect();
    const t = e.touches[0];
    const mx = (t.clientX - rect.left) * (cvs.width / rect.width);
    const my = (t.clientY - rect.top) * (cvs.height / rect.height);
    if (mx < lensX() - 5) { srcX = mx; srcY = my; }
  }, { passive: false });

  // Click: toggle all/representative rays
  cvs.addEventListener('click', () => {
    showAllRays = !showAllRays;
  });

  // Controls
  UI.bindRange('range-rays', 'val-rays', v => { rayCount = Math.round(v); });
  UI.bindRange('range-focal', 'val-focal', v => { focalRatio = v; });
  UI.bindCheckbox('cb-construction', v => { showConstruction = v; });
  UI.bindCheckbox('cb-allrays', v => { showAllRays = v; });
  UI.bindCheckbox('cb-dimline', v => { showDimLine = v; });

  // Mode
  UI.initModeButtons('#modeSwitcher', { setMode: (m) => {
    document.body.classList.remove('teacher-mode', 'sheet-mode');
    if (m === 'teacher') document.body.classList.add('teacher-mode');
    if (m === 'sheet') document.body.classList.add('sheet-mode');
  }});

  // Fullscreen
  document.getElementById('btnFullscreen').addEventListener('click', () => {
    UI.toggleFullscreen(document.documentElement);
  });

  // Start animation loop
  requestAnimationFrame(function loop() {
    draw();
    requestAnimationFrame(loop);
  });
</script>
</body>
</html>
