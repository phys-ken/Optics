<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可変絞りレンズ — Optics Lab</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">
    <a href="../index.html" class="site-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
      Optics Lab
    </a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">← トップ</a>
      <a href="lens.html" class="nav-link">レンズ</a>
      <a href="lens-object.html" class="nav-link">物体の像</a>
      <a href="mirror.html" class="nav-link">平面鏡</a>
      <a href="concave.html" class="nav-link">凹面鏡</a>
      <a href="slits.html" class="nav-link">光線モデル</a>
      <a href="eye.html" class="nav-link">目</a>
      <a href="3d.html" class="nav-link">3D</a>
      <a href="practice.html" class="nav-link">練習</a>
    </nav>
  </div>
</header>

<div class="sim-page">
  <div class="sim-toolbar">
    <div>
      <span style="font-weight:700;">可変絞りレンズ</span>
      <span style="font-size:var(--font-size-xs); color:var(--color-text-muted); margin-left:var(--space-3);">
        絞り（開口部）の大きさによる結像の変化
      </span>
    </div>
    <div class="mode-switcher" id="modeSwitcher" style="margin-left:auto;">
      <button class="mode-btn active" data-mode="student">自習</button>
      <button class="mode-btn" data-mode="teacher">授業</button>
      <button class="mode-btn" data-mode="sheet">作図</button>
    </div>
    <button id="btnFullscreen" class="btn btn--ghost btn--sm" title="フルスクリーン">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </div>

  <div class="sim-body" id="simBody">

    <!-- Sidebar -->
    <aside class="sim-sidebar" id="simSidebar">
      <div class="control-label">レンズ設定</div>

      <div style="display:flex; flex-direction:column; gap:var(--space-4); margin-top:var(--space-3);">

        <div class="control-group">
          <div class="control-row">
            <span class="control-label">レンズの幅（絞り）</span>
            <span class="range-value" id="val-aperture">3</span>
          </div>
          <input type="range" id="range-aperture" min="1" max="10" value="3" step="0.1">
          <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--color-text-muted); margin-top:4px;">
            <span>広い</span>
            <span>狭い</span>
          </div>
        </div>

        <label class="checkbox-label">
          <input type="checkbox" id="cb-construction">
          作図線を表示
        </label>

        <label class="checkbox-label">
          <input type="checkbox" id="cb-allrays" checked>
          全光線を表示
        </label>
      </div>

      <div class="divider"></div>

      <div class="info-panel" id="infoPanel">
        <div class="info-panel__title">物理量</div>
        <div class="info-row">
          <span class="info-row__label">焦点距離 f</span>
          <span class="info-row__value" id="info-f">—</span>
        </div>
        <div class="info-row">
          <span class="info-row__label">物体距離 a</span>
          <span class="info-row__value" id="info-a">—</span>
        </div>
        <div class="info-row">
          <span class="info-row__label">像の距離 b</span>
          <span class="info-row__value" id="info-b">—</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="formula-box">
        <div class="control-label" style="margin-bottom:6px;">レンズの式</div>
        <p>1/f = 1/a + 1/b</p>
        <div style="font-size:var(--font-size-xs); color:var(--color-text-muted); margin-top:var(--space-2);">絞りを狭くすると収差が減るが、光量も減少する。</div>
      </div>

      <div class="divider"></div>

      <div style="font-size:var(--font-size-xs); color:var(--color-text-muted); line-height:1.7;">
        <strong>操作方法</strong><br>
        • マウス: 光源を動かす<br>
        • クリック: 全光線 / 代表線 切替<br>
        • スライダー: レンズの幅を変更
      </div>

    </aside>

    <!-- Canvas -->
    <div class="sim-canvas-wrap" id="canvasWrap">
      <canvas id="mainCanvas"></canvas>
      <div class="canvas-hint">スライダーで絞りと焦点距離を変更</div>
    </div>

  </div>
</div>

<script src="../js/optics.js"></script>
<script>
  /* ============================================================
     Variable Aperture Lens – faithful to archived LensWide.html
     Single slider controls aperture (h / sliderValue).
     Fixed: 40 rays, focal length = w/6.
     Click toggles all-rays vs construction-only.
  ============================================================ */

  const canvas = document.getElementById('mainCanvas');
  const wrap   = document.getElementById('canvasWrap');
  const ctx    = canvas.getContext('2d');
  const oc     = new OpticsCanvas(canvas);

  let srcX, srcY, w, h, f, showAllRays = true;

  function resize() {
    canvas.width  = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    w = canvas.width;
    h = canvas.height;
    f = w / 6;
    if (!srcX) { srcX = w / 6; srcY = h / 2; }
    draw();
  }

  /* ---- linemaker: archived helper – line from (x1,y1) through (x2,y2) extended to x=end ---- */
  function linemaker(x1, y1, x2, y2, end, col) {
    const y3 = y1 + (y2 - y1) * (end - x1) / (x2 - x1);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(end, y3);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function draw() {
    if (w <= 0 || h <= 0) return;
    oc.drawBackground();

    const sliderVal = parseFloat(document.getElementById('range-aperture').value);
    const slithole  = h / sliderVal;          // aperture height
    const lx        = w / 2;                  // lens x
    const honsu     = 40;                     // fixed ray count
    const r         = h / 20;                 // source radius
    const showConstruction = document.getElementById('cb-construction').checked;
    const showAll   = document.getElementById('cb-allrays').checked && showAllRays;

    // ---- Image position via lens equation ----
    const a_dist  = lx - srcX;
    const b_dist  = (f * a_dist) / (a_dist - f);
    const imgX    = lx + b_dist;
    const kh      = srcY - h / 2;
    const imgH    = f * kh / (a_dist - f);
    const imgY    = -imgH + h / 2;

    // ---- Optical axis ----
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // ---- Screen (right edge) ----
    ctx.fillStyle = '#222';
    ctx.fillRect(w - w / 30, 0, w / 30, h);

    // ---- Focal & 2f points (filled squares) ----
    const bs = 8;
    ctx.fillStyle = '#222';
    ctx.fillRect(lx + f - bs / 2, h / 2 - bs / 2, bs, bs);
    ctx.fillRect(lx - f - bs / 2, h / 2 - bs / 2, bs, bs);
    ctx.fillRect(lx + 2 * f - bs / 2, h / 2 - bs / 2, bs, bs);
    ctx.fillRect(lx - 2 * f - bs / 2, h / 2 - bs / 2, bs, bs);

    // ---- Rays (radial from source) ----
    for (let i = 0; i < 2 * honsu; i++) {
      const diagL = Math.sqrt(h * h + w * w);
      let L = showAll ? diagL : 0;

      let takasa = 0;
      if (i > 0 && i < honsu) {
        takasa = (lx - srcX) * Math.tan(Math.PI * i / honsu + Math.PI / 2);
        const hitY = srcY + takasa;
        if (hitY < h / 2 + slithole / 2 && hitY > h / 2 - slithole / 2) {
          L = Math.sqrt(takasa * takasa + (lx - srcX) * (lx - srcX));
        }
      }

      const x2 = srcX + L * Math.sin(Math.PI * i / honsu);
      const y2 = srcY - L * Math.cos(Math.PI * i / honsu);

      ctx.beginPath();
      ctx.moveTo(srcX, srcY);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = '#e6a800';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Refracted ray beyond lens
      if (i > 0 && i < honsu) {
        const hitY = srcY + takasa;
        if (hitY < h / 2 + slithole / 2 && hitY > h / 2 - slithole / 2) {
          if (a_dist !== f) {
            linemaker(x2, y2, imgX, imgY, w, '#cc3300');
          }
        }
      }
    }

    // ---- Source (yellow circle) ----
    ctx.beginPath();
    ctx.arc(srcX, srcY, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffcc00';
    ctx.fill();
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.stroke();

    // ---- Lens (quadratic curves matching archived) ----
    const lensw = 40;
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(lx, h / 2 - slithole / 2);
    ctx.quadraticCurveTo(lx - lensw, h / 2, lx, h / 2 + slithole / 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(lx, h / 2 - slithole / 2);
    ctx.quadraticCurveTo(lx + lensw, h / 2, lx, h / 2 + slithole / 2);
    ctx.stroke();

    // ---- Construction lines ----
    if (showConstruction) {
      // 1) Ray through lens center (extends to right edge)
      linemaker(srcX, srcY, lx, h / 2, w, 'rgba(37,99,235,0.7)');
      // 2) Parallel ray from lens at source height → through right focal point
      linemaker(lx, srcY, lx + f, h / 2, w, 'rgba(37,99,235,0.7)');
      // 3) Horizontal ray from source to lens
      linemaker(srcX, srcY, lx, srcY, lx, 'rgba(37,99,235,0.7)');
    }

    // ---- Info panel ----
    const fPx  = f.toFixed(0);
    const aPx  = a_dist.toFixed(0);
    const bStr = isFinite(b_dist) ? b_dist.toFixed(0) + ' px' : '∞';
    UI.updateInfo({ 'info-f': fPx + ' px', 'info-a': aPx + ' px', 'info-b': bStr });
  }

  // ---- Mouse: move source (constrained left of lens, not at focal point) ----
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const lx = w / 2;
    if (mx < lx && Math.abs(mx - (lx - f)) > 5) {
      srcX = mx;
      srcY = my;
      draw();
    }
  });

  // ---- Touch support ----
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const mx = t.clientX - rect.left;
    const my = t.clientY - rect.top;
    const lx = w / 2;
    if (mx < lx && Math.abs(mx - (lx - f)) > 5) {
      srcX = mx;
      srcY = my;
      draw();
    }
  }, { passive: false });

  // ---- Click: toggle all-rays ----
  canvas.addEventListener('click', () => {
    showAllRays = !showAllRays;
    draw();
  });

  // ---- Slider ----
  document.getElementById('range-aperture').addEventListener('input', function () {
    document.getElementById('val-aperture').textContent = this.value;
    draw();
  });

  // ---- Checkboxes ----
  document.getElementById('cb-construction').addEventListener('change', draw);
  document.getElementById('cb-allrays').addEventListener('change', draw);

  // ---- Mode switcher ----
  UI.initModeButtons('#modeSwitcher', {
    setMode: mode => {
      document.body.classList.remove('teacher-mode', 'sheet-mode');
      if (mode === 'teacher') document.body.classList.add('teacher-mode');
      if (mode === 'sheet')   document.body.classList.add('sheet-mode');
      setTimeout(draw, 100);
    }
  });

  document.getElementById('btnFullscreen').addEventListener('click', () => UI.toggleFullscreen(wrap));

  const resizeObs = new ResizeObserver(resize);
  resizeObs.observe(wrap);
  resize();
</script>
</body>
</html>
